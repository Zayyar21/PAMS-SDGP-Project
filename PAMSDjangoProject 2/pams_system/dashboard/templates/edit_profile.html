<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Edit Profile</title>

<style>

body{
margin:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f1f5f9;
}

/* sidebar */

.sidebar{
width:230px;
height:100vh;
background:#0f172a;
color:white;
padding-top:25px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:35px;
}

.sidebar a{
display:block;
color:#cbd5f1;
text-decoration:none;
padding:13px 25px;
font-size:15px;
}

.sidebar a:hover{
background:#1e293b;
}

.active{
background:#2563eb;
color:white;
border-radius:6px;
margin:5px 12px;
}

/* content */

.page{
margin-left:230px;
padding:40px 60px;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
max-width:520px;
}

/* avatar preview */

.avatar{
width:110px;
height:110px;
border-radius:50%;
background:#2563eb;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:600;
margin-bottom:15px;
overflow:hidden;
}

.avatar img{
width:110px;
height:110px;
object-fit:cover;
border-radius:50%;
}

/* form */

label{
display:block;
margin-top:15px;
font-weight:600;
font-size:14px;
color:#334155;
}

input{
width:100%;
padding:11px;
margin-top:6px;
border-radius:8px;
border:1px solid #e2e8f0;
font-size:14px;
}

button{
margin-top:20px;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
width:100%;
}

button:hover{
background:#1d4ed8;
}

/* alerts */

.success{
background:#dcfce7;
color:#166534;
padding:10px;
border-radius:8px;
margin-bottom:15px;
}

.error{
background:#fee2e2;
color:#991b1b;
padding:10px;
border-radius:8px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🏢 PAMS</h2>

<div class="menu">

<a href="{% url 'home' %}">
<i class="fa-solid fa-house"></i> Dashboard
</a>

<a href="{% url 'rent' %}">
<i class="fa-solid fa-credit-card"></i> Rent Payment
</a>

<a href="{% url 'maintenance' %}">
<i class="fa-solid fa-screwdriver-wrench"></i> Maintenance
</a>

<a href="{% url 'complaints' %}">
<i class="fa-solid fa-circle-exclamation"></i> Complaints
</a>

<a href="{% url 'complaint_list' %}">
<i class="fa-solid fa-list"></i> Complaint History
</a>

<a href="{% url 'history' %}">
<i class="fa-solid fa-clock-rotate-left"></i> Payment History
</a>

<a href="{% url 'profile' %}">
<i class="fa-solid fa-user"></i> Profile
</a>

</div>

</div>



<div class="page">

<h1>Edit Profile</h1>



<div class="card">

{% if messages %}
{% for message in messages %}
<div class="success">{{ message }}</div>
{% endfor %}
{% endif %}



<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<!-- PHOTO PREVIEW -->
<div class="avatar">

{% if profile.photo %}
<img src="{{ profile.photo.url }}">
{% else %}
{{ user.username|slice:":1"|upper }}
{% endif %}

</div>



<label>Profile Photo</label>
<input type="file" name="photo">

<label>First Name</label>
<input type="text" name="first_name" value="{{ user.first_name }}">

<label>Last Name</label>
<input type="text" name="last_name" value="{{ user.last_name }}">

<label>Email</label>
<input type="email" name="email" value="{{ user.email }}">

<label>Phone</label>
<input type="text" name="phone" value="{{ profile.phone }}">

<label>Address</label>
<input type="text" name="address" value="{{ profile.address }}">

<button>Save Changes</button>

</form>

</div>

</div>

</body>

</html>
