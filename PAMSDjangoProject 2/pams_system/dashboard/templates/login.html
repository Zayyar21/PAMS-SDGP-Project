<!DOCTYPE html>
<html>

<head>

<title>Tenant Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* card */

.login-card{

background:white;
padding:40px;
width:360px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;

}

/* logo */

.logo{

font-size:26px;
font-weight:bold;
margin-bottom:5px;
color:#2563eb;

}

.subtitle{

color:#64748b;
font-size:14px;
margin-bottom:25px;

}


/* input container */

.input-group{

position:relative;
margin-bottom:18px;

}


/* icon left */

.input-group .icon-left{

position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#64748b;

}


/* icon right */

.input-group .icon-right{

position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#64748b;

}


/* inputs */

.form-control{

width:100%;
padding:12px 40px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
outline:none;
box-sizing:border-box;

}

.form-control:focus{

border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);

}


/* remember */

.remember{

display:flex;
align-items:center;
font-size:14px;
margin-bottom:18px;
color:#334155;

}

.remember input{

margin-right:8px;

}


/* button */

button{

width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
font-size:15px;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}


/* footer */

.footer{

margin-top:18px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
<i class="fa fa-building"></i> PAMS
</div>

<div class="subtitle">
Tenant Portal Login
</div>


{% if form.errors %}
<p style="color:red;">Invalid username or password</p>
{% endif %}


<form method="post">

{% csrf_token %}


<div class="input-group">

<i class="fa fa-user icon-left"></i>

<input
type="text"
name="username"
placeholder="Username"
class="form-control"
required>

</div>


<div class="input-group">

<i class="fa fa-lock icon-left"></i>

<input
type="password"
name="password"
id="password"
placeholder="Password"
class="form-control"
required>

<i class="fa fa-eye icon-right" onclick="togglePassword()"></i>

</div>


<div class="remember">

<input type="checkbox">

<label>Remember me</label>

</div>


<button type="submit">

Login

</button>

<br>

<a href="{% url 'register' %}">
Create new account
</a>

</form>


<div class="footer">

Property & Apartment Management System

</div>

</div>


<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

</script>

</body>

</html>
