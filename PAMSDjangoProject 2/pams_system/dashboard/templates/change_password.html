<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Change Password</title>

<style>

body{
margin:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f1f5f9;
}

.page{
margin-left:230px;
padding:40px 60px;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
max-width:450px;
}

input{
width:100%;
padding:11px;
margin-top:10px;
border-radius:8px;
border:1px solid #e2e8f0;
}

button{
margin-top:15px;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-weight:600;
width:100%;
}

.error{
color:red;
font-size:13px;
}

</style>

</head>



<body>

<div class="page">

<h1>Change Password</h1>



<div class="card">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button>Update Password</button>

</form>

</div>

</div>

</body>

</html>
